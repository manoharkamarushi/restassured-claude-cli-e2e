# Base Configuration
base.uri=https://reqres.in/api
environment=qa

# Authentication Credentials
username=admin
password=admin123
api.key=your-api-key-here
oauth.token=your-oauth-token-here

# Request/Response Configuration
request.timeout=5000
max.response.time=3000
content.type=application/json
accept.type=application/json

# Parallel Execution
parallel.execution=true
thread.pool.size=3

# Reporting Configuration
report.path=test-reports
allure.path=allure-results
screenshot.path=screenshots

# Database Configuration (if needed)
db.host=localhost
db.port=5432
db.username=dbuser
db.password=dbpass
db.name=testdb

# Logging
log.level=INFO
log.file.path=logs
